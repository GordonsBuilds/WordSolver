<!doctype html>
<html lang="en">

    <title>Codex Webapp</title>

      content="Starter web app scaffold for the first Codex GitHub repository."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
